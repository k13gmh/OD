<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            background: #121212; 
            color: white; 
            text-align: center; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .input-box {
            width: 100%;
            max-width: 300px;
            padding: 15px;
            margin: 0 auto 20px;
            border: 2px solid #333;
            border-radius: 8px;
            background: #1e1e1e;
            color: white;
            font-size: 1.2em;
            text-align: center;
        }
        .btn { 
            display: inline-block; 
            width: 100%;
            max-width: 330px;
            margin: 0 auto;
            padding: 15px; 
            background: #007bff; 
            color: white; 
            border: none;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Coming Soon</h1>
    <p>We are currently updating Gary's Driving Tutorials.</p>
    
    <input type="tel" id="entryCode" class="input-box" placeholder=" ">
    
    <button onclick="checkAccess()" class="btn">Return to Portal</button>

    <script>
        function checkAccess() {
            var code = document.getElementById("entryCode").value.trim();
            
            if (code === "07538054450") {
                window.location.href = "Movies.html";
            } else {
                // This is the "Force Exit" workaround
                // It sends the browser to a dead internal link, effectively 'closing' your site
                window.location.replace("about:blank");
            }
        }

        document.getElementById("entryCode").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                checkAccess();
            }
        });
    </script>

</body>
</html>
