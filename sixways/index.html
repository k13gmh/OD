<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            background: #121212; 
            color: white; 
            text-align: center; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }
        h1 { font-size: 2.5em; margin-bottom: 10px; color: #f0f0f0; }
        p { color: #888; margin-bottom: 30px; }
        
        .input-box {
            width: 100%;
            max-width: 300px;
            padding: 15px;
            margin: 0 auto 20px;
            border: 2px solid #333;
            border-radius: 8px;
            background: #1e1e1e;
            color: white;
            font-size: 1.2em;
            text-align: center;
            outline: none;
        }
        .input-box:focus { border-color: #007bff; }

        .btn { 
            display: inline-block; 
            width: 100%;
            max-width: 330px;
            margin: 0 auto;
            padding: 15px; 
            background: #007bff; 
            color: white; 
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover { background: #0056b3; }
    </style>
</head>
<body>

    <h1>Coming Soon</h1>
    <p>We are currently updating Gary's Driving Tutorials. Check back shortly for new content.</p>
    
    <input type="text" id="entryCode" class="input-box" placeholder="Enter Reference Number">
    
    <button onclick="checkAccess()" class="btn">Return to Portal</button>

    <script>
        function checkAccess() {
            var code = document.getElementById("entryCode").value;
            // The specific number check
            if (code === "07538054450") {
                window.location.href = "Movies.html";
            } else {
                // Optional: You can add an alert here if you want
                // alert("Invalid reference number.");
            }
        }

        // Allow pressing "Enter" on the keyboard to submit
        document.getElementById("entryCode").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                checkAccess();
            }
        });
    </script>

</body>
</html>
