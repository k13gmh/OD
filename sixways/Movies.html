<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worcester Roundabout Training</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #121212; 
            color: #ffffff; 
            text-align: center; 
            padding: 20px;
            margin: 0;
        }
        .wrapper { 
            max-width: 900px; 
            margin: 20px auto; 
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        h3 { margin-bottom: 5px; color: #f0f0f0; }
        p { color: #888; font-size: 0.9em; }
    </style>
</head>
<body>

    <h3>Worcester Roundabout Training</h3>
    <p>Private Student Access Only</p>

    <div class="wrapper">
        <div class="video-container">
            <!-- Your Google Drive Video with the /preview modification -->
            <iframe 
                src="https://drive.google.com/file/d/1uFcKg2OrqD-SqRnjxHFmdcXUWFDDGe3C/preview" 
                allow="autoplay; encrypted-media" 
                allowfullscreen>
            </iframe>
        </div>
    </div>

    <p style="margin-top: 30px;"><em>Note: If the video doesn't play, please ensure you are logged into your Google account in this browser.</em></p>

</body>
</html>
