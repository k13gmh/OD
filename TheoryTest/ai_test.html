<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orion AI Test Harness v1.2.3</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .version-label { font-size: 0.7rem; color: #999; float: right; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 1rem; }
        button { width: 100%; padding: 15px; margin: 10px 0; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; font-size: 1rem; transition: 0.2s; }
        .btn-preview { background: #3498db; color: white; }
        .btn-confirm { background: #2ecc71; color: white; display: none; }
        #display-area { margin-top: 20px; padding: 15px; border-left: 4px solid #3498db; background: #f9f9f9; display: none; }
        .choice { margin: 5px 0; padding: 8px; background: #eee; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <span class="version-label">v1.2.3</span>
    <h2>Orion Test Controller</h2>
    
    <label for="qid-input">Enter Question ID:</label>
    <input type="text" id="qid-input" placeholder="e.g. 1">
    
    <button class="btn-preview" onclick="previewQuestion()">Load Question</button>

    <div id="display-area">
        <h3>Question Preview</h3>
        <p id="q-text" style="font-size: 1.1rem; font-weight: bold;"></p>
        <div id="q-options"></div>
        <button class="btn-confirm" id="confirm-btn" onclick="triggerAI()">CONFIRM: Ask A Friend</button>
    </div>
</div>

<script src="askafriend.js"></script>

<script>
    let activeQuestionData = null;

    function previewQuestion() {
        const id = document.getElementById('qid-input').value.trim();
        const display = document.getElementById('display-area');
        const optionsDiv = document.getElementById('q-options');
        const confirmBtn = document.getElementById('confirm-btn');

        // 1. Get raw data from Local Storage [cite: 2026-02-06]
        const rawData = localStorage.getItem('orion_master.json');
        
        if (!rawData) {
            alert("Error: 'orion_master.json' not found in Local Storage.");
            return;
        }

        // 2. Parse the JSON string [cite: 2026-02-06]
        const masterList = JSON.parse(rawData);
        
        // 3. Find the specific ID [cite: 2026-02-06]
        const found = masterList.find(item => item.id == id);

        if (found) {
            activeQuestionData = found;
            document.getElementById('q-text').innerText = found.question;
            optionsDiv.innerHTML = ""; 
            
            // Render options A-D [cite: 2026-02-06]
            for (const [key, text] of Object.entries(found.choices)) {
                optionsDiv.innerHTML += `<div class="choice"><strong>${key}:</strong> ${text}</div>`;
            }

            display.style.display = "block";
            confirmBtn.style.display = "block";
        } else {
            alert("ID " + id + " not found in local master data.");
            display.style.display = "none";
        }
    }

    function triggerAI() {
        if (!activeQuestionData) return;

        const id = activeQuestionData.id;
        const question = activeQuestionData.question;
        const choices = activeQuestionData.choices;

        // Call the specific function name as requested [cite: 2026-02-06]
        if (typeof askafriend === "function") {
            askafriend(id, question, choices);
        } else {
            alert("System Message: Function 'askafriend' not found. Please create askafriend.js.");
        }
    }
</script>

</body>
</html>
