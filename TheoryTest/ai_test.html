<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orion AI Test Harness</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: #fff; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1); width: 100%; max-width: 550px; position: relative; }
        .version-label { position: absolute; top: 10px; right: 15px; font-size: 0.7rem; color: #ccc; }
        .input-group { margin-bottom: 1.5rem; }
        button { width: 100%; padding: 0.75rem; background-color: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: bold; }
        #question-display { margin-top: 2rem; padding-top: 1rem; border-top: 2px solid #eee; }
        
        /* Lifeline Button Row with Icons [cite: 2026-02-06] */
        .lifeline-row { display: flex; gap: 8px; margin-top: 15px; }
        .btn-lifeline { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            gap: 5px; 
            padding: 10px 5px; 
        }
        .btn-lifeline span { font-size: 1.2rem; } /* Icon size */
        
        .btn-hub { background-color: #28a745; }
        .btn-nat { background-color: #17a2b8; }
        .btn-dash { background-color: #333; }
        
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="container">
    <span class="version-label">Harness v1.2.7</span>
    <h2>Orion Test Controller</h2>
    <div class="input-group">
        <label for="qid">Enter Question ID:</label>
        <input type="number" id="qid" placeholder="e.g. 7">
    </div>
    <button onclick="loadTestQuestion()">Load Question</button>

    <div id="question-display" style="display:none;">
        <h3 id="q-text"></h3>
        <div id="q-options"></div>
        
        <div class="lifeline-row">
            <button id="ask-hub-btn" class="btn-lifeline btn-hub">
                <span>📞</span> Hub
            </button>
            <button id="ask-nat-btn" class="btn-lifeline btn-nat">
                <span>🛰️</span> Nat
            </button>
            <button id="ask-dash-btn" class="btn-lifeline btn-dash">
                <span>📷</span> Dash
            </button>
        </div>
    </div>
</div>

<script src="askafriend.js"></script>
<script src="natsav.js"></script>
<script src="dashkam.js"></script>

<script>
    function loadTestQuestion() {
        const id = document.getElementById('qid').value;
        const display = document.getElementById('question-display');
        const masterData = JSON.parse(localStorage.getItem('orion_master.json') || "[]");
        const question = masterData.find(q => q.id == id);

        if (!question) {
            alert("Question ID not found in local storage!");
            return;
        }

        display.style.display = 'block';
        document.getElementById('q-text').innerText = question.question;
        const qOptions = document.getElementById('q-options');
        qOptions.innerHTML = '';
        
        for (const [key, value] of Object.entries(question.choices)) {
            const p = document.createElement('p');
            p.innerHTML = `<strong>${key}:</strong> ${value}`;
            qOptions.appendChild(p);
        }

        // Initialize Lifeline Triggers [cite: 2026-02-06]
        document.getElementById('ask-hub-btn').onclick = function() {
            askafriend(question.id, question.question, question.choices);
        };

        document.getElementById('ask-nat-btn').onclick = function() {
            natsav(question.id);
        };

        document.getElementById('ask-dash-btn').onclick = function() {
            dashkam(question.id);
        };
    }
</script>

</body>
</html>
