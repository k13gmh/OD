<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orion AI Test Harness</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            position: relative;
        }
        h2 { margin-top: 0; color: #333; }
        .input-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: #666; }
        input[type="number"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover { background-color: #0056b3; }
        #question-display {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 2px solid #eee;
        }
        .version-label {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 0.7rem;
            color: #ccc;
        }
    </style>
</head>
<body>

<div class="container">
    <span class="version-label">Harness v1.2.3</span>
    <h2>Orion Test Controller</h2>
    
    <div class="input-group">
        <label for="qid">Enter Question ID:</label>
        <input type="number" id="qid" placeholder="e.g. 7">
    </div>
    
    <button onclick="loadTestQuestion()">Load Question</button>

    <div id="question-display" style="display:none;">
        <h3 id="q-text"></h3>
        <div id="q-options"></div>
        <br>
        <button id="ask-hub-btn" style="background-color: #28a745;">Ask Hub Capp</button>
    </div>
</div>

<script src="askafriend.js"></script>

<script>
    /**
     * Simulation of the Orion Drive master data and memory systems
     * for testing purposes. [cite: 2026-02-06]
     */
    function loadTestQuestion() {
        const id = document.getElementById('qid').value;
        const display = document.getElementById('question-display');
        const qText = document.getElementById('q-text');
        const qOptions = document.getElementById('q-options');
        const hubBtn = document.getElementById('ask-hub-btn');

        // Retrieve local data [cite: 2026-02-06]
        const masterData = JSON.parse(localStorage.getItem('orion_master.json') || "[]");
        const question = masterData.find(q => q.id == id);

        if (!question) {
            alert("Question ID not found in local orion_master.json!");
            return;
        }

        // Setup display [cite: 2026-02-06]
        display.style.display = 'block';
        qText.innerText = question.question;
        qOptions.innerHTML = '';
        
        // Render options [cite: 2026-02-06]
        for (const [key, value] of Object.entries(question.choices)) {
            const p = document.createElement('p');
            p.innerHTML = `<strong>${key}:</strong> ${value}`;
            qOptions.appendChild(p);
        }

        // Connect the "Friend" trigger [cite: 2026-02-06]
        hubBtn.onclick = function() {
            askafriend(question.id, question.question, question.choices);
        };
    }
</script>

</body>
</html>
