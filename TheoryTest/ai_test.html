<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orion AI Test Harness v1.2.2</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .version-label { font-size: 0.7rem; color: #999; float: right; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 1rem; }
        button { width: 100%; padding: 15px; margin: 10px 0; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; font-size: 1rem; transition: 0.2s; }
        .btn-preview { background: #3498db; color: white; }
        .btn-confirm { background: #2ecc71; color: white; display: none; }
        #display-area { margin-top: 20px; padding: 15px; border-left: 4px solid #3498db; background: #f9f9f9; display: none; }
        .choice { margin: 5px 0; padding: 8px; background: #eee; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <span class="version-label">v1.2.2</span>
    <h2>Orion Test Controller</h2>
    
    <label for="qid-input">Enter Question ID:</label>
    <input type="text" id="qid-input" placeholder="e.g. 400">
    
    <button class="btn-preview" onclick="previewQuestion()">Load Question</button>

    <div id="display-area">
        <h3>Question Preview</h3>
        <p id="q-text" style="font-size: 1.1rem;"></p>
        <div id="q-options"></div>
        <button class="btn-confirm" id="confirm-btn" onclick="triggerAI()">CONFIRM: Ask A Friend</button>
    </div>
</div>

<script>
    // Simulating your Orion Master data [cite: 2026-02-06]
    const orionMaster = {
        "400": {
            "question": "What should you do if your car begins to skid when you brake?",
            "choices": {
                "A": "Release the footbrake and steer into the skid",
                "B": "Brake harder to stop the slide",
                "C": "Select a higher gear",
                "D": "Apply the handbrake"
            }
        },
        "401": {
            "question": "In which conditions are your stopping distances likely to be ten times longer?",
            "choices": {
                "A": "In heavy rain",
                "B": "In thick fog",
                "C": "On icy roads",
                "D": "On a very hot day"
            }
        }
    };

    function previewQuestion() {
        const id = document.getElementById('qid-input').value.trim();
        const data = orionMaster[id];
        const display = document.getElementById('display-area');

        if (data) {
            document.getElementById('q-text').innerText = data.question;
            const optionsDiv = document.getElementById('q-options');
            optionsDiv.innerHTML = ""; 
            
            for (const [key, text] of Object.entries(data.choices)) {
                optionsDiv.innerHTML += `<div class="choice"><strong>${key}:</strong> ${text}</div>`;
            }

            display.style.display = "block";
            document.getElementById('confirm-btn').style.display = "block";
        } else {
            alert("ID " + id + " not found.");
            display.style.display = "none";
        }
    }

    function triggerAI() {
        const id = document.getElementById('qid-input').value.trim();
        const data = orionMaster[id];

        // This checks if the function "askafriend" exists globally [cite: 2026-02-06]
        if (typeof askafriend === "function") {
            askafriend(id, data.question, data.choices);
        } else {
            alert("Error: The function 'askafriend' is not defined. Ensure askafriend.js is loaded.");
        }
    }
</script>

</body>
</html>
