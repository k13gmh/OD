<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orion Drive - Fuel Settings</title>
    <style>
        :root {
            --primary: #007bff;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #333;
            --input-border: #ddd;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }

        h2 { text-align: center; color: var(--primary); margin-top: 0; }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--input-border);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--primary); }

        .btn-save {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }

        #status {
            text-align: center;
            margin-top: 15px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .version-tag {
            position: fixed;
            bottom: 10px;
            right: 15px;
            font-size: 0.7rem;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Fuel Settings</h2>
        
        <div class="form-group">
            <label>What do I call you?</label>
            <input type="text" id="ui_name" placeholder="Name or Nickname">
        </div>

        <div class="form-group">
            <label>Home Postcode</label>
            <input type="text" id="ui_postcode" placeholder="e.g. DY10">
        </div>

        <div class="form-group">
            <label>Search Radius (Miles)</label>
            <input type="number" id="ui_range" placeholder="e.g. 5">
        </div>

        <div class="form-group">
            <label>Preferred Brand</label>
            <input type="text" id="ui_brand" placeholder="Esso, Tesco or ALL">
        </div>

        <div class="form-group">
            <label>Fuel Type</label>
            <select id="ui_fuel">
                <option value="E10">Unleaded (E10)</option>
                <option value="E5">Super Unleaded (E5)</option>
                <option value="B7">Diesel (B7)</option>
                <option value="SDV">Premium Diesel (SDV)</option>
                <option value="ALL">All Types</option>
            </select>
        </div>

        <button class="btn-save" id="saveBtn" onclick="saveToOrion()">SAVE PREFERENCES</button>

        <div id="status"></div>
    </div>

    <div class="version-tag">v1.2.1</div>

    <script>
        window.onload = function() {
            if(localStorage.getItem('OrionUserName')) document.getElementById('ui_name').value = localStorage.getItem('OrionUserName');
            if(localStorage.getItem('OrionPostcode')) document.getElementById('ui_postcode').value = localStorage.getItem('OrionPostcode');
            if(localStorage.getItem('OrionRange')) document.getElementById('ui_range').value = localStorage.getItem('OrionRange');
            if(localStorage.getItem('OrionBrand')) document.getElementById('ui_brand').value = localStorage.getItem('OrionBrand');
            if(localStorage.getItem('OrionFuelType')) document.getElementById('ui_fuel').value = localStorage.getItem('OrionFuelType');
        };

        async function saveToOrion() {
            const statusBox = document.getElementById('status');
            const saveBtn = document.getElementById('saveBtn');
            const pc = document.getElementById('ui_postcode').value.trim();

            if (!pc) {
                statusBox.style.color = "red";
                statusBox.innerText = "Postcode required.";
                return;
            }

            statusBox.style.color = "orange";
            statusBox.innerText = "Geocoding Postcode...";
            saveBtn.disabled = true;

            try {
                const response = await fetch(`https://api.postcodes.io/postcodes/${pc}`);
                const data = await response.json();

                if (data.status === 200) {
                    const lat = data.result.latitude;
                    const lon = data.result.longitude;

                    // Save everything
                    localStorage.setItem('OrionUserName', document.getElementById('ui_name').value);
                    localStorage.setItem('OrionPostcode', pc);
                    localStorage.setItem('OrionLat', lat);
                    localStorage.setItem('OrionLon', lon);
                    localStorage.setItem('OrionRange', document.getElementById('ui_range').value);
                    localStorage.setItem('OrionBrand', document.getElementById('ui_brand').value);
                    localStorage.setItem('OrionFuelType', document.getElementById('ui_fuel').value);

                    statusBox.style.color = "green";
                    statusBox.innerText = `Saved! (Lat: ${lat}, Lon: ${lon})`;
                } else {
                    statusBox.style.color = "red";
                    statusBox.innerText = "Invalid Postcode.";
                }
            } catch (error) {
                statusBox.style.color = "red";
                statusBox.innerText = "Network Error.";
            } finally {
                saveBtn.disabled = false;
            }
        }
    </script>

</body>
</html>
