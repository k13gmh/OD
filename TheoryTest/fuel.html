<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orion Drive - Fuel Finder Setup</title>
    <style>
        :root {
            --primary: #007bff;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #333;
            --input-border: #ddd;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }

        h2 {
            text-align: center;
            color: var(--primary);
            margin-top: 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--input-border);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box; /* Ensures padding doesn't break width */
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
        }

        .btn-save {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-save:active {
            opacity: 0.8;
        }

        #status {
            text-align: center;
            margin-top: 15px;
            font-size: 0.85rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Fuel Settings</h2>
        
        <div class="form-group">
            <label for="userName">What do I call you?</label>
            <input type="text" id="userName" placeholder="Enter name or nickname">
        </div>

        <div class="form-group">
            <label for="postcode">Home Postcode (Min 4 chars)</label>
            <input type="text" id="postcode" placeholder="e.g. DY10" maxlength="8">
        </div>

        <div class="form-group">
            <label for="range">Search Radius (Miles)</label>
            <input type="number" id="range" placeholder="e.g. 5" min="1" max="50">
        </div>

        <div class="form-group">
            <label for="brand">Preferred Brand</label>
            <input type="text" id="brand" placeholder="e.g. Esso, Tesco or ALL">
        </div>

        <div class="form-group">
            <label for="fuelType">Fuel Type</label>
            <select id="fuelType">
                <option value="E10">Unleaded (E10)</option>
                <option value="E5">Super Unleaded (E5)</option>
                <option value="B7">Diesel (B7)</option>
                <option value="SDV">Premium Diesel (SDV)</option>
                <option value="ALL">All Types</option>
            </select>
        </div>

        <button class="btn-save" onclick="saveFuelSettings()">SAVE PREFERENCES</button>

        <div id="status"></div>
    </div>

    <script src="fuelmgr.js"></script>

    <script>
        // Placeholder function until we build fuelmgr.js
        function saveFuelSettings() {
            const status = document.getElementById('status');
            status.style.color = "orange";
            status.innerText = "Connecting to fuelmgr.js...";
            
            if (typeof initFuelSave === "function") {
                initFuelSave();
            } else {
                setTimeout(() => {
                    status.style.color = "red";
                    status.innerText = "Error: fuelmgr.js not found.";
                }, 500);
            }
        }
    </script>

</body>
</html>
