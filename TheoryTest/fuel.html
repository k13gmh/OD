<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orion Drive - Fuel Settings</title>
    <style>
        :root {
            --primary: #007bff;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #333;
            --input-border: #ddd;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            position: relative;
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }

        h2 {
            text-align: center;
            color: var(--primary);
            margin-top: 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--input-border);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
        }

        .btn-save {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }

        #status {
            text-align: center;
            margin-top: 15px;
            font-size: 0.85rem;
            font-weight: bold;
            color: green;
        }

        .version-tag {
            position: fixed;
            bottom: 10px;
            right: 15px;
            font-size: 0.7rem;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Fuel Settings</h2>
        
        <div class="form-group">
            <label>What do I call you?</label>
            <input type="text" id="ui_name" placeholder="Name or Nickname">
        </div>

        <div class="form-group">
            <label>Home Postcode</label>
            <input type="text" id="ui_postcode" placeholder="e.g. DY10">
        </div>

        <div class="form-group">
            <label>Search Radius (Miles)</label>
            <input type="number" id="ui_range" placeholder="e.g. 5">
        </div>

        <div class="form-group">
            <label>Preferred Brand</label>
            <input type="text" id="ui_brand" placeholder="Esso, Tesco or ALL">
        </div>

        <div class="form-group">
            <label>Fuel Type</label>
            <select id="ui_fuel">
                <option value="E10">Unleaded (E10)</option>
                <option value="E5">Super Unleaded (E5)</option>
                <option value="B7">Diesel (B7)</option>
                <option value="SDV">Premium Diesel (SDV)</option>
                <option value="ALL">All Types</option>
            </select>
        </div>

        <button class="btn-save" onclick="saveToOrion()">SAVE PREFERENCES</button>

        <div id="status"></div>
    </div>

    <div class="version-tag">v1.2.0</div>

    <script>
        // Version constant for the script
        const FUEL_VERSION = "1.2.0";

        // Load existing data if available on startup
        window.onload = function() {
            if(localStorage.getItem('OrionUserName')) {
                document.getElementById('ui_name').value = localStorage.getItem('OrionUserName');
            }
            if(localStorage.getItem('OrionPostcode')) {
                document.getElementById('ui_postcode').value = localStorage.getItem('OrionPostcode');
            }
            if(localStorage.getItem('OrionRange')) {
                document.getElementById('ui_range').value = localStorage.getItem('OrionRange');
            }
            if(localStorage.getItem('OrionBrand')) {
                document.getElementById('ui_brand').value = localStorage.getItem('OrionBrand');
            }
            if(localStorage.getItem('OrionFuelType')) {
                document.getElementById('ui_fuel').value = localStorage.getItem('OrionFuelType');
            }
        };

        function saveToOrion() {
            // Grab values from the UI
            const name = document.getElementById('ui_name').value;
            const pc = document.getElementById('ui_postcode').value;
            const miles = document.getElementById('ui_range').value;
            const brand = document.getElementById('ui_brand').value;
            const fuel = document.getElementById('ui_fuel').value;

            // Store values locally using Orion prefix
            localStorage.setItem('OrionUserName', name);
            localStorage.setItem('OrionPostcode', pc);
            localStorage.setItem('OrionRange', miles);
            localStorage.setItem('OrionBrand', brand);
            localStorage.setItem('OrionFuelType', fuel);

            // Notify user
            const statusBox = document.getElementById('status');
            statusBox.innerText = "Preferences Saved Locally.";
            
            // Clear status after 3 seconds
            setTimeout(() => { statusBox.innerText = ""; }, 3000);
        }
    </script>

</body>
</html>
